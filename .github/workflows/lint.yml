---
name: Lint
'on':
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6
      - name: Set up Python 3.12.
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install test dependencies.
        run: pip3 install yamllint ansible-lint ansible
      - name: Run yamllint.
        run: yamllint .
      - name: Run ansible-lint.
        run: ansible-lint
      - name: Set up Helm.
        uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Run helm lint.
        run: |
          helm lint ./k8s/helm/kube-prometheus-stack
          helm lint ./k8s/helm/minecraft
          helm lint ./k8s/helm/rcon-web-admin
